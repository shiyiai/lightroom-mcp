[tools]
node = "24"
bun = "1.3.14"
lua = "5.5.0"
# selene (Rust) is the Lua linter — see lua:lint. A native binary, so unlike
# luacheck it does not run on the Lua above and is immune to Lua-version breaks.
"aqua:Kampfkarren/selene" = "0.31.0"

[env]
# Project-local LuaRocks tree (busted) installed by `lua:deps`.
_.path = ["lua_modules/bin"]

[tasks.install]
description = "Install dependencies"
run = "cd server && npm install"

[tasks.build]
description = "Build TypeScript MCP server"
run = "cd server && npm run build"

[tasks.test]
description = "Run tests"
run = "cd server && npm test"

[tasks.dev]
description = "Build in watch mode"
run = "cd server && npm run watch"

[tasks.mcpb]
description = "Build the .mcpb bundle for Claude Desktop / Claude Code"
run = "node scripts/build-mcpb.mjs"

[tasks.binary]
description = "Build single-file binaries (macos + windows) via Bun"
run = "node scripts/build-binary.mjs"

[tasks."lua:deps"]
description = "Install Lua test rocks (busted) into lua_modules/"
run = "test -x lua_modules/bin/busted || luarocks install --tree lua_modules busted"

[tasks."lua:test"]
description = "Run busted specs for the Lightroom plugin"
depends = ["lua:deps"]
run = "busted"

[tasks."lua:lint"]
description = "Lint the Lightroom plugin with selene"
run = "selene plugin/LightroomMCP.lrplugin"
